<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI 성격 유형 테스트</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Outfit and Noto Sans KR for Korean support -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation"></div>
    <main class="container">
        <section id="start-screen" class="glass-card fade-in">
            <h1 class="title">나의 진짜 성격은?</h1>
            <p class="description">8개의 간단한 질문으로 알아보는 나의 MBTI유형</p>
            <button id="start-btn" class="primary-btn">테스트 시작하기</button>
        </section>

        <section id="question-screen" class="glass-card hidden">
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <h2 id="q-number" class="q-number">Q1</h2>
            <p id="q-text" class="q-text">질문 내용이 여기에 표시됩니다.</p>
            <div class="options-container">
                <button class="option-btn" data-choice="prev">선택지 1</button>
                <button class="option-btn" data-choice="next">선택지 2</button>
            </div>
        </section>

        <section id="result-screen" class="glass-card hidden">
            <h1 class="result-title">당신의 유형은...</h1>
            <div class="result-image-container">
                <img id="mbti-image" src="" alt="MBTI Character" class="mbti-character-img">
            </div>
            <div id="mbti-type" class="mbti-type">ENFP</div>
            <h2 id="mbti-nickname" class="mbti-nickname">열정적인 중재자</h2>
            
            <div class="result-info">
                <p id="mbti-description" class="mbti-description">여기에 유형 설명이 들어갑니다.</p>
                <div class="quote-box">
                    <span class="quote-icon">"</span>
                    <p id="mbti-quote" class="mbti-quote">여기에 유머러스한 응답이 들어갑니다.</p>
                </div>
            </div>

            <button id="restart-btn" class="primary-btn">테스트 다시하기</button>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
